<svg xmlns="http://www.w3.org/2000/svg" width="620" height="520" viewBox="0 0 620 520" role="img" aria-label="图乙：A、B、C、D四个x-t图象选项">
  <rect width="620" height="520" fill="#fff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <g id="axes">
      <line x1="22" y1="110" x2="240" y2="110" stroke="#111" stroke-width="2.2" marker-end="url(#arrow)"/>
      <line x1="46" y1="185" x2="46" y2="18" stroke="#111" stroke-width="2.2" marker-end="url(#arrow)"/>
      <text x="232" y="135" font-family="Times New Roman, serif" font-size="21" font-style="italic">t</text>
      <text x="34" y="18" font-family="Times New Roman, serif" font-size="21" font-style="italic">x</text>
      <text x="26" y="131" font-family="Times New Roman, serif" font-size="20" font-style="italic">O</text>
      <line x1="104" y1="103" x2="104" y2="117" stroke="#111" stroke-width="1.8"/>
      <line x1="161" y1="103" x2="161" y2="117" stroke="#111" stroke-width="1.8"/>
      <line x1="218" y1="103" x2="218" y2="117" stroke="#111" stroke-width="1.8"/>
      <text x="95" y="141" font-family="Times New Roman, serif" font-size="18" font-style="italic">t<tspan baseline-shift="sub" font-size="12">1</tspan></text>
      <text x="152" y="141" font-family="Times New Roman, serif" font-size="18" font-style="italic">t<tspan baseline-shift="sub" font-size="12">2</tspan></text>
      <text x="209" y="141" font-family="Times New Roman, serif" font-size="18" font-style="italic">t<tspan baseline-shift="sub" font-size="12">3</tspan></text>
    </g>
  </defs>

  <g transform="translate(20 18)">
    <use href="#axes"/>
    <line x1="46" y1="50" x2="218" y2="50" stroke="#777" stroke-width="1.2" stroke-dasharray="5 5"/>
    <line x1="46" y1="172" x2="218" y2="172" stroke="#777" stroke-width="1.2" stroke-dasharray="5 5"/>
    <path d="M46 50 L104 110 H161 L218 50" fill="none" stroke="#111" stroke-width="3.2"/>
    <text x="126" y="212" font-family="Times New Roman, serif" font-size="24">A</text>
  </g>

  <g transform="translate(330 18)">
    <use href="#axes"/>
    <path d="M46 110 L104 48 V110 L161 172 L218 110" fill="none" stroke="#111" stroke-width="3.2"/>
    <text x="126" y="212" font-family="Times New Roman, serif" font-size="24">B</text>
  </g>

  <g transform="translate(20 272)">
    <use href="#axes"/>
    <line x1="46" y1="50" x2="218" y2="50" stroke="#777" stroke-width="1.2" stroke-dasharray="5 5"/>
    <line x1="46" y1="172" x2="218" y2="172" stroke="#777" stroke-width="1.2" stroke-dasharray="5 5"/>
    <path d="M46 110 L104 50 H161 L218 172" fill="none" stroke="#111" stroke-width="3.2"/>
    <text x="126" y="212" font-family="Times New Roman, serif" font-size="24">C</text>
  </g>

  <g transform="translate(330 272)">
    <use href="#axes"/>
    <line x1="46" y1="50" x2="218" y2="50" stroke="#777" stroke-width="1.2" stroke-dasharray="5 5"/>
    <line x1="46" y1="172" x2="218" y2="172" stroke="#777" stroke-width="1.2" stroke-dasharray="5 5"/>
    <path d="M46 110 L104 50 V110 H161 L218 172" fill="none" stroke="#111" stroke-width="3.2"/>
    <text x="126" y="212" font-family="Times New Roman, serif" font-size="24">D</text>
  </g>

  <text x="300" y="505" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="24">乙</text>
</svg>
