<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220" viewBox="0 0 360 220" role="img" aria-label="图甲：v-t图象，0到t1速度为v1，t1到t2速度为0，t2到t3速度为负v1">
  <rect width="360" height="220" fill="#fff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
  </defs>
  <line x1="58" y1="116" x2="318" y2="116" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="82" y1="184" x2="82" y2="34" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="323" y="123" font-family="Times New Roman, serif" font-size="24" font-style="italic">t</text>
  <text x="70" y="30" font-family="Times New Roman, serif" font-size="24" font-style="italic">v</text>
  <text x="58" y="136" font-family="Times New Roman, serif" font-size="22" font-style="italic">O</text>

  <line x1="82" y1="62" x2="288" y2="62" stroke="#777" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="82" y1="170" x2="288" y2="170" stroke="#777" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="28" y="68" font-family="Times New Roman, serif" font-size="22" font-style="italic">v<tspan baseline-shift="sub" font-size="14">1</tspan></text>
  <text x="22" y="176" font-family="Times New Roman, serif" font-size="22" font-style="italic">-v<tspan baseline-shift="sub" font-size="14">1</tspan></text>

  <line x1="148" y1="108" x2="148" y2="124" stroke="#111" stroke-width="2"/>
  <line x1="218" y1="108" x2="218" y2="124" stroke="#111" stroke-width="2"/>
  <line x1="288" y1="108" x2="288" y2="124" stroke="#111" stroke-width="2"/>
  <text x="138" y="150" font-family="Times New Roman, serif" font-size="22" font-style="italic">t<tspan baseline-shift="sub" font-size="14">1</tspan></text>
  <text x="208" y="150" font-family="Times New Roman, serif" font-size="22" font-style="italic">t<tspan baseline-shift="sub" font-size="14">2</tspan></text>
  <text x="278" y="150" font-family="Times New Roman, serif" font-size="22" font-style="italic">t<tspan baseline-shift="sub" font-size="14">3</tspan></text>

  <path d="M82 62 H148 V116 H218 V170 H288" fill="none" stroke="#111" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
  <text x="162" y="206" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="22">甲</text>
</svg>
