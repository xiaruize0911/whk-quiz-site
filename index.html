<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>期末刷题本</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="panel sidebar">
        <div class="brand">
          <p class="eyebrow">Final Drill Lab</p>
          <h1>期末刷题本</h1>
          <p class="muted">按学科随机刷题，自动累计次数、强化错题。</p>
        </div>

        <section class="sidebar-section">
          <h2>学科</h2>
          <div id="subject-tabs" class="subject-tabs"></div>
        </section>

        <section class="sidebar-section">
          <h2>模式</h2>
          <div class="mode-stack">
            <button class="mode-btn active" data-mode="subject-random">同学科随机</button>
            <button class="mode-btn" data-mode="choice-only">仅选择题</button>
            <button class="mode-btn" data-mode="sequential">顺序练习</button>
            <button class="mode-btn" data-mode="shuffled-cycle">乱序不重复</button>
            <button class="mode-btn" data-mode="wrong-priority">错题优先</button>
            <button class="mode-btn" data-mode="wrong-only">只刷错题</button>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="section-head">
            <h2>AI 设置</h2>
            <button id="clear-api-key" class="ghost-btn">清除</button>
          </div>
          <label class="input-label" for="deepseek-api-key">DeepSeek API Key</label>
          <div class="api-key-row">
            <input id="deepseek-api-key" class="api-key-input" type="password" autocomplete="off" placeholder="sk-..." />
            <button id="save-api-key" class="primary-btn">保存</button>
          </div>
          <p id="api-key-status" class="muted api-key-status">未保存 API Key</p>
        </section>

        <section class="sidebar-section">
          <div class="section-head">
            <h2>统计</h2>
            <button id="reset-subject-stats" class="ghost-btn">重置当前学科</button>
          </div>
          <div id="stats-grid" class="stats-grid"></div>
        </section>

        <section class="sidebar-section">
          <div class="section-head">
            <h2>错题本</h2>
            <button id="clear-wrongbook" class="ghost-btn">清空</button>
          </div>
          <div id="wrongbook-list" class="wrongbook-list"></div>
        </section>
      </aside>

      <main class="panel main-panel">
        <header class="question-toolbar">
          <div>
            <p id="question-meta" class="eyebrow">等待载入</p>
            <h2 id="question-title">正在准备题库</h2>
          </div>
          <div class="toolbar-actions">
            <div class="view-switch" aria-label="页面切换">
              <button id="practice-view-btn" class="view-btn active">刷题</button>
              <button id="ledger-view-btn" class="view-btn">题目数据</button>
              <button id="answer-review-view-btn" class="view-btn">背答案</button>
            </div>
            <div class="question-actions" aria-label="题目操作">
              <button id="prev-btn" class="ghost-btn">上一题</button>
              <button id="next-btn" class="ghost-btn">下一题</button>
              <button id="reveal-btn" class="primary-btn">显示答案</button>
              <button id="ai-explain-btn" class="primary-btn">AI 解析</button>
            </div>
          </div>
        </header>

        <section id="practice-view" class="question-card">
          <div id="question-section" class="question-section"></div>
          <div class="keyboard-help" aria-label="键盘快捷键说明">
            <span><kbd>←</kbd> 上一题</span>
            <span><kbd>→</kbd> 下一题</span>
            <span><kbd>Space</kbd> 下一题</span>
            <span><kbd>1-4</kbd> 选择选项</span>
            <span><kbd>Y</kbd> 自评正确</span>
            <span><kbd>N</kbd> 自评错误</span>
          </div>
          <div id="material-content" class="material-box hidden"></div>
          <div id="prompt-content" class="rich-block prompt-block"></div>

          <div id="choice-wrapper" class="choice-wrapper hidden">
            <div id="options-raw" class="rich-block option-source"></div>
            <div id="answer-buttons" class="answer-buttons"></div>
          </div>

          <div id="input-wrapper" class="input-wrapper hidden">
            <label class="input-label" for="subjective-input">作答区</label>
            <textarea id="subjective-input" class="subjective-input" placeholder="在这里输入答案，显示答案后自行对照批改。"></textarea>
          </div>

          <div id="subjective-actions" class="subjective-actions hidden">
            <button id="mark-correct-btn" class="success-btn">自评正确</button>
            <button id="mark-wrong-btn" class="danger-btn">自评错误</button>
          </div>

          <div id="feedback-box" class="feedback-box hidden"></div>
          <div id="answer-content" class="answer-panel hidden"></div>
          <div id="ai-explanation-panel" class="ai-explanation-panel hidden">
            <div class="ai-explanation-head">
              <div>
                <p class="eyebrow">DeepSeek</p>
                <h3>AI 详细解析</h3>
              </div>
              <span id="ai-explanation-meta" class="muted"></span>
            </div>
            <div id="ai-explanation-content" class="rich-block"></div>
          </div>
        </section>

        <section id="ledger-view" class="ledger-panel hidden">
          <div class="ledger-head">
            <div>
              <p class="eyebrow">Question Data</p>
              <h2>题目数据</h2>
            </div>
            <div id="ledger-summary" class="ledger-summary"></div>
          </div>
          <div id="question-ledger" class="question-ledger"></div>
        </section>

        <section id="answer-review-view" class="answer-review-panel hidden">
          <div class="ledger-head">
            <div>
              <p class="eyebrow">Answer Review</p>
              <h2>背答案</h2>
            </div>
            <div class="answer-review-actions">
              <div id="answer-review-summary" class="ledger-summary"></div>
              <button id="copy-answer-review-btn" class="primary-btn">复制本学科答案</button>
            </div>
          </div>
          <div id="answer-review-copy-status" class="muted answer-review-copy-status"></div>
          <textarea id="answer-review-plain-text" class="answer-review-plain-text" readonly aria-label="当前学科纯文本答案"></textarea>
          <div id="answer-review-list" class="answer-review-list"></div>
        </section>
      </main>
    </div>

    <div id="image-zoom" class="image-zoom hidden" role="dialog" aria-modal="true" aria-label="图片预览">
      <button id="image-zoom-close" class="image-zoom-close" aria-label="关闭图片预览">×</button>
      <img id="image-zoom-img" alt="" />
    </div>

    <script src="./data/questions.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
